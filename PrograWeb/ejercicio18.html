<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 18 - Manipulación del DOM con Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-light">

    <div class="container mt-5" style="max-width: 450px;">
        <div class="card shadow">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">Gestor de Lista</h2>
                
                <div class="input-group mb-3">
                    <input type="text" id="nuevoElemento" class="form-control" placeholder="Escribe algo">
                    <button id="agregarBtn" class="btn btn-primary">Agregar</button>
                </div>

                <ul id="lista" class="list-group">
                    </ul>
            </div>
        </div>
    </div>

    <script src="js/ejercicio18.js"></script>
</body>
</html>
